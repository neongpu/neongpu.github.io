{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <i class="date">Published: {{ .Date.Format "Mon, Jan 2, 2006" }}</i>
    
    <div class="post-content">
        {{ .Content }}
    </div>

    {{ with .PrevInSection }}
    <a href="{{ .Permalink }}">Previous Post: {{.Title}}</a>
    {{ end }}
    {{ with .NextInSection }}
    <a href="{{ .Permalink }}">Next Post: {{.Title}}</a>
    {{ end }}
</article>
{{ end }}
